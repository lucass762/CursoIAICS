<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UZUMAKI CHAT</title>
    <link rel="icon" type="image/png" href="https://mir-s3-cdn-cf.behance.net/project_modules/1400_webp/cd536c196707911.66248e1b7f8d9.png">
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #212121;
            color: #ECECEC;
            margin: 0;
            padding: 0;
            height: 100vh;
        }
        #bg-video {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.5;
            z-index: 0;
            pointer-events: none;
        }
        body > * {
            position: relative;
            z-index: 1;
        }
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        #login-box {
            background-color: rgba(26, 26, 26, 0.92);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #333;
            width: 320px;
            text-align: center;
        }
        #login-box h1 {
            margin: 0 0 8px 0;
            font-size: 26px;
            color: #fff;
        }
        #login-box p {
            margin: 0 0 24px 0;
            color: #999;
            font-size: 14px;
        }
        #login-box .campo {
            margin-bottom: 16px;
            text-align: left;
        }
        #login-box label {
            display: block;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 4px;
        }
        #login-box input {
            width: 100%;
            padding: 12px;
            border: 1px solid #444;
            border-radius: 8px;
            background: #2f2f2f;
            color: #fff;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
        }
        #login-box input:focus {
            border-color: #4a9eff;
        }
        #login-box button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #4a9eff;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        #login-box button:hover {
            background-color: #3a8eef;
        }
        #login-erro {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }
        #chat-screen {
            display: none;
            flex-direction: column;
            height: 100vh;
        }
        #header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 0;
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            background-color: rgba(26, 26, 26, 0.85);
            border-bottom: 1px solid #333;
        }
        #header img {
            height: 36px;
            width: 36px;
            border-radius: 50%;
            object-fit: cover;
            animation: float 2s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        #chat-container {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }
        .message {
            padding: 15px 20px;
            border-radius: 18px;
            max-width: 80%;
            word-wrap: break-word;
            line-height: 1.5;
        }
        .user {
            background-color: rgba(254, 134, 33, 0.75);
            color: #1a1a1a;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .bot {
            background-color: #1a1a1a;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #333;
        }
        #input-container {
            padding: 16px 20px;
            background-color: rgba(33, 33, 33, 0.85);
            display: flex;
            justify-content: center;
            border-top: 1px solid #333;
        }
        #input-box {
            display: flex;
            max-width: 800px;
            width: 100%;
            gap: 10px;
            background-color: #2f2f2f;
            border-radius: 12px;
            padding: 4px;
        }
        #input-box input {
            flex-grow: 1;
            padding: 12px 16px;
            border: none;
            background: transparent;
            color: #fff;
            font-size: 15px;
            outline: none;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background-color: #4a9eff;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #3a8eef;
        }
    </style>
</head>
<body>

    <video id="bg-video" src="/bg-video" autoplay loop muted playsinline></video>

    <div id="login-screen">
        <div id="login-box">
            <img src="https://mir-s3-cdn-cf.behance.net/project_modules/1400_webp/cd536c196707911.66248e1b7f8d9.png" alt="Kurama" style="height:64px;width:64px;border-radius:50%;object-fit:cover;margin-bottom:8px;animation:float 2s ease-in-out infinite;">
            <h1>UZUMAKI CHAT</h1>
            <p>Faça login para entrar no chat</p>
            <div class="campo">
                <label for="login-user">Usuário</label>
                <input type="text" id="login-user" placeholder="Digite seu usuário" autocomplete="off">
            </div>
            <div class="campo">
                <label for="login-senha">Senha</label>
                <input type="password" id="login-senha" placeholder="Digite sua senha">
            </div>
            <button onclick="fazerLogin()">Entrar</button>
            <div id="login-erro"></div>
        </div>
    </div>

    <div id="chat-screen">
        <div id="header"><img src="https://mir-s3-cdn-cf.behance.net/project_modules/1400_webp/cd536c196707911.66248e1b7f8d9.png" alt="Kurama"> UZUMAKI CHAT</div>
        <div id="chat-container"></div>

        <div id="input-container">
            <div id="input-box">
                <input type="text" id="user-input" placeholder="Digite sua mensagem..." autocomplete="off">
                <button onclick="sendMessage()">Enviar</button>
            </div>
        </div>
    </div>
        </div>
    </div>

    <script>
        document.getElementById("login-user").addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                e.preventDefault();
                document.getElementById("login-senha").focus();
            }
        });

        document.getElementById("login-senha").addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                e.preventDefault();
                fazerLogin();
            }
        });

        async function fazerLogin() {
            const user = document.getElementById("login-user").value.trim();
            const senha = document.getElementById("login-senha").value.trim();
            const erroEl = document.getElementById("login-erro");

            if (!user || !senha) {
                erroEl.innerText = "Preencha todos os campos.";
                erroEl.style.display = "block";
                return;
            }

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user, senha })
                });

                const data = await response.json();

                if (data.sucesso) {
                    document.getElementById("login-screen").style.display = "none";
                    document.getElementById("chat-screen").style.display = "flex";
                    await carregarHistorico();
                    document.getElementById("user-input").focus();
                } else {
                    erroEl.innerText = data.erro || "Usuário ou senha inválidos.";
                    erroEl.style.display = "block";
                }
            } catch (error) {
                erroEl.innerText = "Erro ao conectar com o servidor.";
                erroEl.style.display = "block";
            }
        }

        async function carregarHistorico() {
            const container = document.getElementById("chat-container");
            container.innerHTML = "";
            try {
                const response = await fetch('/historico');
                const data = await response.json();
                if (data.historico && data.historico.length > 0) {
                    data.historico.forEach(item => {
                        const div = document.createElement("div");
                        div.className = `message ${item.role}`;
                        div.innerText = item.text;
                        container.appendChild(div);
                    });
                } else {
                    const div = document.createElement("div");
                    div.className = "message bot";
                    div.innerText = "Olá! Como posso ajudar você hoje?";
                    container.appendChild(div);
                }
                container.scrollTop = container.scrollHeight;
            } catch (error) {
                const div = document.createElement("div");
                div.className = "message bot";
                div.innerText = "Olá! Como posso ajudar você hoje?";
                container.appendChild(div);
            }
        }

        const inputField = document.getElementById("user-input");
        
        inputField.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const message = inputField.value.trim();
            if (!message) return;

            addMessageToChat('user', message);
            inputField.value = '';

            const loadingId = addMessageToChat('bot', 'Pensando...');

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ mensagem: message })
                });

                const data = await response.json();
                
                document.getElementById(loadingId).innerText = data.resposta || data.erro;

            } catch (error) {
                document.getElementById(loadingId).innerText = "Erro ao se conectar com o servidor.";
            }
        }

        function addMessageToChat(role, text) {
            const container = document.getElementById("chat-container");
            const div = document.createElement("div");
            div.className = `message ${role}`;
            div.innerText = text;
            
            const id = 'msg-' + Date.now() + '-' + Math.floor(Math.random() * 10000);
            div.id = id;
            
            container.appendChild(div);
            
            container.scrollTop = container.scrollHeight;
            return id;
        }
    </script>
</body>
</html>
