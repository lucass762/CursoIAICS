<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUCAS CODE</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #212121;
            color: #ECECEC;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #chat-container {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }
        .message {
            padding: 15px;
            border-radius: 8px;
            max-width: 80%;
            word-wrap: break-word;
        }
        .user {
            background-color: #2f2f2f;
            align-self: flex-end;
            border: 1px solid #444;
        }
        .bot {
            background-color: #171717;
            align-self: flex-start;
            border: 1px solid #333;
        }
        #input-container {
            padding: 20px;
            background-color: #212121;
            display: flex;
            justify-content: center;
        }
        #input-box {
            display: flex;
            max-width: 800px;
            width: 100%;
            gap: 10px;
        }
        input {
            flex-grow: 1;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            background-color: #2f2f2f;
            color: #fff;
            font-size: 16px;
        }
        button {
            padding: 15px 25px;
            border: none;
            border-radius: 8px;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <header style="text-align: center; padding: 20px 10px 10px; font-size: 28px; font-weight: bold; color: #007bff;">
        LUCAS CODE
    </header>

    <div id="chat-container">
        <div class="message bot">Olá! Como posso ajudar você hoje?</div>
    </div>

    <div id="input-container">
        <div id="input-box">
            <input type="text" id="user-input" placeholder="Digite sua mensagem..." autocomplete="off">
            <button onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        const inputField = document.getElementById("user-input");
        
        // Enviar com a tecla Enter
        inputField.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const message = inputField.value.trim();
            if (!message) return;

            addMessageToChat('user', message);
            inputField.value = '';

            // Mostrar mensagem de carregamento
            const loadingId = addMessageToChat('bot', 'Pensando...');

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ mensagem: message })
                });

                const data = await response.json();
                
                // Atualiza a mensagem de carregamento com a resposta real
                document.getElementById(loadingId).innerText = data.resposta || data.erro;

            } catch (error) {
                document.getElementById(loadingId).innerText = "Erro ao se conectar com o servidor.";
            }
        }

        function addMessageToChat(role, text) {
            const container = document.getElementById("chat-container");
            const div = document.createElement("div");
            div.className = `message ${role}`;
            div.innerText = text;
            
            // Gera um ID único para poder atualizar a mensagem depois (útil pro 'Pensando...')
            const id = 'msg-' + Date.now() + '-' + Math.floor(Math.random() * 10000);
            div.id = id;
            
            container.appendChild(div);
            
            // Rola para o fim
            container.scrollTop = container.scrollHeight;
            return id;
        }
    </script>
</body>
</html>
