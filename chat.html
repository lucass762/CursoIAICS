<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUCASGPT</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #212121;
            color: #ECECEC;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('https://www.correiobraziliense.com.br/cbradar/wp-content/uploads/2025/03/robos_1742321492248.jpg') center center / cover no-repeat;
            opacity: 0.5;
            z-index: 0;
        }
        body > * {
            position: relative;
            z-index: 1;
        }
        #header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 0;
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            background-color: rgba(26, 26, 26, 0.85);
            border-bottom: 1px solid #333;
        }
        #header img {
            height: 36px;
            width: 36px;
            border-radius: 50%;
            object-fit: cover;
            animation: float 2s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        #chat-container {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }
        .message {
            padding: 15px 20px;
            border-radius: 18px;
            max-width: 80%;
            word-wrap: break-word;
            line-height: 1.5;
        }
        .user {
            background-color: #2b2b2b;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .bot {
            background-color: #1a1a1a;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #333;
        }
        #input-container {
            padding: 16px 20px;
            background-color: rgba(33, 33, 33, 0.85);
            display: flex;
            justify-content: center;
            border-top: 1px solid #333;
        }
        #input-box {
            display: flex;
            max-width: 800px;
            width: 100%;
            gap: 10px;
            background-color: #2f2f2f;
            border-radius: 12px;
            padding: 4px;
        }
        input {
            flex-grow: 1;
            padding: 12px 16px;
            border: none;
            background: transparent;
            color: #fff;
            font-size: 15px;
            outline: none;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background-color: #4a9eff;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #3a8eef;
        }
    </style>
</head>
<body>

    <div id="header"><img src="https://img.magnific.com/psd-gratuitas/robot-3d-bonito-agitando-a-mao-vector-de-desenho-animado-icon-ilustracao-pessoas-tecnologia-vector-plano-isolado_138676-10649.jpg" alt="Robô"> LUCASCODE</div>
    <div id="chat-container">
        <div class="message bot">Olá! Como posso ajudar você hoje?</div>
    </div>

    <div id="input-container">
        <div id="input-box">
            <input type="text" id="user-input" placeholder="Digite sua mensagem..." autocomplete="off">
            <button onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        const inputField = document.getElementById("user-input");
        
        // Enviar com a tecla Enter
        inputField.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const message = inputField.value.trim();
            if (!message) return;

            addMessageToChat('user', message);
            inputField.value = '';

            // Mostrar mensagem de carregamento
            const loadingId = addMessageToChat('bot', 'Pensando...');

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ mensagem: message })
                });

                const data = await response.json();
                
                // Atualiza a mensagem de carregamento com a resposta real
                document.getElementById(loadingId).innerText = data.resposta || data.erro;

            } catch (error) {
                document.getElementById(loadingId).innerText = "Erro ao se conectar com o servidor.";
            }
        }

        function addMessageToChat(role, text) {
            const container = document.getElementById("chat-container");
            const div = document.createElement("div");
            div.className = `message ${role}`;
            div.innerText = text;
            
            // Gera um ID único para poder atualizar a mensagem depois (útil pro 'Pensando...')
            const id = 'msg-' + Date.now() + '-' + Math.floor(Math.random() * 10000);
            div.id = id;
            
            container.appendChild(div);
            
            // Rola para o fim
            container.scrollTop = container.scrollHeight;
            return id;
        }
    </script>
</body>
</html>
